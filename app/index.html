<!DOCTYPE html>
<html>
<head>
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kaybeden ve Bulan Uygulama Sayfası">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6368006900269736" crossorigin="anonymous"></script>

  <title>Kaybeden ve Bulan - App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; overflow: hidden; }
    
    /* Profesyonel Header Yapısı */
    .custom-header {
      background-color: #1e3a8a;
      display: grid;
      grid-template-columns: 250px 1fr 250px; /* Üçlü bölme: Logo - Arama - Buton */
      align-items: center;
      padding: 0 30px;
      color: white;
      height: 70px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Logo Alanı */
    .header-logo-container {
      display: flex; 
      align-items: center; 
      text-decoration: none; 
      color: white;
      transition: opacity 0.2s ease;
      justify-self: start;
    }
    .header-logo-container:hover { opacity: 0.85; }

    .logo-text { font-size: 22px; white-space: nowrap; letter-spacing: -0.5px; }
    .logo-text .bold { font-weight: 800; }
    .logo-text .light { font-weight: 300; color: #bfdbfe; }
    .logo-text span.amp { color: #60a5fa; margin: 0 3px; font-style: italic; }

    /* Merkezi Arama Alanı */
    .search-container { 
      display: flex; 
      justify-content: center;
      width: 100%;
    }
    .search-bar { 
      width: 100%; 
      max-width: 450px; 
      position: relative; 
    }
    .search-input {
      width: 100%; 
      padding: 10px 15px 10px 42px; 
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2); 
      font-size: 14px; 
      background-color: rgba(255,255,255,0.1); 
      color: white;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.5); }
    .search-input:focus { 
      background-color: white; 
      color: #0f172a;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border-color: white;
    }

    .search-icon {
      position: absolute; 
      left: 14px; 
      top: 52%; 
      transform: translateY(-50%); 
      color: rgba(255,255,255,0.6);
      pointer-events: none;
      font-size: 16px;
    }
    .search-input:focus + .search-icon { color: #1e3a8a; }

    /* Buton Alanı */
    .header-action {
      justify-self: end;
    }
    .btn-post {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 11px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .btn-post:hover { 
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -2px rgba(37, 99, 235, 0.4);
    }
    .btn-post:active { transform: translateY(0); }

    /* Flutter İçerik Alanı */
    #flutter_app {
      width: 100%;
      height: 100vh;
      padding-top: 70px;
      box-sizing: border-box;
    }

    /* Mobil Uyumluluk */
    @media (max-width: 768px) {
      .custom-header {
        grid-template-columns: 1fr auto;
        padding: 0 15px;
      }
      .search-container { display: none; } /* Mobilde arama alanını gizle veya küçült */
    }
  </style>
</head>
<body>

  <header class="custom-header">
    <!-- Logoya tıklandığında index sayfasına yönlendirme -->
    <a href="/app/index.html" class="header-logo-container">
      <div class="logo-text">
        <span class="bold">Kaybeden</span><span class="amp">&</span><span class="light">Bulan</span>
      </div>
    </a>

    <!-- Merkezi Arama Çubuğu -->
    <div class="search-container">
      <div class="search-bar">
        <input type="text" class="search-input" placeholder="İlanlarda veya kategorilerde ara...">
        <span class="search-icon">🔍</span>
      </div>
    </div>

    <!-- Ücretsiz İlan Ver Butonu -->
    <div class="header-action">
      <button onclick="goToCreatePost()" class="btn-post">Ücretsiz İlan Ver</button>
    </div>
  </header>

  <div id="flutter_app"></div>

  <script>
    // Butonun çalışmama sorununu düzelten yönlendirme fonksiyonu
    function goToCreatePost() {
      // Flutter Web rotasını tetiklemek için hash kullanımı en güvenli yoldur
      const targetUrl = window.location.origin + "/app/#/create-post";
      window.location.href = targetUrl;
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
