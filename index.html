<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaybeden ve Bulan | Eşyalarınızı Bulmanın En Kolay Yolu</title>
    <!-- Üretim uyarısını gidermek için Tailwind Play CDN yerine resmi CSS çıktısı mantığına geçiş (Geliştirme için şimdilik en iyisi) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#f8fbff] text-[#1e293b] overflow-x-hidden;
                font-family: 'Plus Jakarta Sans', sans-serif;
            }
        }
        @layer components {
            .logo-box {
                @apply relative overflow-hidden rounded-[1.25rem] bg-white flex items-center justify-center;
                box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.1);
            }
            .floating-btn {
                @apply fixed right-0 top-1/2 -translate-y-1/2 bg-[#2563eb] text-white px-3.5 py-6 rounded-l-[24px] font-extrabold z-[90] shadow-[-10px_0_30px_rgba(37,99,235,0.25)] uppercase;
                writing-mode: vertical-rl;
                text-orientation: mixed;
            }
            .input-field {
                @apply w-full p-5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 transition-all;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        #sidePanel {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translateX(100%);
        }
        #sidePanel.open { transform: translateX(0); }
        
        .verification-step {
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-7xl mx-auto px-6 py-8 min-h-screen flex flex-col">
        <nav class="flex justify-between items-center mb-16">
            <div class="flex items-center gap-5">
                <div class="logo-box w-16 h-16 border-2 border-white ring-1 ring-blue-50">
                    <!-- Logo Yolu ve Hata Kontrolü -->
                    <img src="./logo.jpg" alt="Logo" class="w-full h-full object-cover" 
                         onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-people-pulling text-blue-600 text-3xl\'></i>';">
                </div>
                <div>
                    <h1 class="text-3xl font-[900] text-blue-900 tracking-tighter leading-none">Kaybeden ve Bulan</h1>
                    <p class="text-[11px] font-bold text-blue-400 tracking-[0.4em] uppercase mt-1.5">kaybedenvebulan.com.tr</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-4 bg-white px-6 py-3 rounded-2xl border border-blue-50 shadow-sm">
                <span class="text-[11px] font-extrabold text-slate-500 uppercase tracking-widest">Sistem Hazırlanıyor</span>
            </div>
        </nav>

        <main class="flex flex-col lg:flex-row items-center gap-16 flex-1">
            <div class="lg:w-1/2 space-y-12">
                <h2 class="text-6xl md:text-8xl font-[950] text-slate-900 leading-[0.95] tracking-tight">
                    Eşyalarınızı <br> bulmanın <br>
                    <span class="text-blue-600 relative inline-block">en kolay yolu.</span>
                </h2>
                <div id="adContainer" class="bg-white p-4 pr-10 rounded-3xl shadow-xl border border-blue-50 inline-flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                        <i class="fa-solid fa-bell animate-bounce"></i>
                    </div>
                    <span id="rotatingText" class="font-bold text-blue-800 transition-opacity duration-500">Uygulamalarımız çok yakında mağazalarda!</span>
                </div>
            </div>
            <div class="lg:w-1/2">
                <div class="relative rounded-[5rem] overflow-hidden shadow-2xl border-[20px] border-white">
                    <img src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=1000&q=80" class="w-full h-[500px] object-cover" alt="Topluluk">
                </div>
            </div>
        </main>
    </div>

    <button onclick="togglePanel(true)" class="floating-btn">GİRİŞ & KAYIT OL</button>

    <!-- Yan Panel -->
    <div id="sidePanel" class="fixed top-0 right-0 h-full w-full md:w-[500px] bg-white z-[100] shadow-2xl flex flex-col">
        <div class="p-8 flex justify-between items-center border-b">
            <h3 id="panelTitle" class="text-2xl font-black text-slate-900">Giriş Yap</h3>
            <button onclick="togglePanel(false)" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto p-10">
            <div id="msgBox" class="hidden mb-6 p-5 rounded-2xl text-sm font-bold border transition-all duration-300"></div>

            <!-- Giriş Formu -->
            <div id="loginForm" class="space-y-6">
                <input type="email" id="l_email" placeholder="E-posta" class="input-field">
                <input type="password" id="l_pass" placeholder="Şifre" class="input-field">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                    <span>Giriş Yap</span>
                </button>
                <p class="text-center text-slate-500 font-bold cursor-pointer" onclick="switchView('reg')">Hesabınız yok mu? <span class="text-blue-600">Kayıt Ol</span></p>
            </div>

            <!-- Kayıt Formu -->
            <div id="regForm" class="hidden space-y-4">
                <input type="text" id="r_name" placeholder="Ad Soyad" class="input-field">
                <input type="email" id="r_email" placeholder="E-posta" class="input-field">
                <input type="tel" id="r_phone" placeholder="Telefon (05XX XXX XX XX)" maxlength="15" oninput="formatPhone(this)" class="input-field">
                <input type="password" id="r_pass" placeholder="Şifre" class="input-field">
                <button onclick="handleRegister()" id="regBtn" class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-green-700 transition-colors">Kayıt Ol ve Link Gönder</button>
                <p class="text-center text-slate-500 font-bold cursor-pointer" onclick="switchView('login')">Zaten üye misiniz? <span class="text-blue-600">Giriş Yap</span></p>
            </div>

            <!-- Doğrulama Ekranı -->
            <div id="verifyForm" class="hidden verification-step text-center space-y-8 py-10">
                <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto text-4xl">
                    <i class="fa-solid fa-envelope-open-text animate-bounce"></i>
                </div>
                <div>
                    <h4 class="text-2xl font-black text-slate-900">E-postanızı Kontrol Edin</h4>
                    <p class="text-slate-500 mt-4 font-medium">
                        <strong id="displayEmail" class="text-blue-600"></strong> adresine bir doğrulama linki gönderdik.
                    </p>
                </div>
                <button onclick="switchView('login')" class="text-blue-600 font-bold underline">Giriş ekranına dön</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://kaybeden-ve-bulunan-bulut-api.vercel.app";
        const FLUTTER_APP_PATH = "/app"; 
        
        const ads = ["Uygulamalarımız çok yakında mağazalarda!", "Kayıp eşyalarını hemen bildir!", "Bulduğun eşyayı sahibine ulaştır!"];
        let adIdx = 0;

        setInterval(() => {
            adIdx = (adIdx + 1) % ads.length;
            const el = document.getElementById('rotatingText');
            if(el) {
                el.style.opacity = 0;
                setTimeout(() => { el.innerText = ads[adIdx]; el.style.opacity = 1; }, 500);
            }
        }, 5000);

        function formatPhone(input) {
            let value = input.value.replace(/\D/g, '');
            let formattedValue = "";
            if (value.length > 0) {
                formattedValue = value.substring(0, 4);
                if (value.length > 4) formattedValue += " " + value.substring(4, 7);
                if (value.length > 7) formattedValue += " " + value.substring(7, 9);
                if (value.length > 9) formattedValue += " " + value.substring(9, 11);
            }
            input.value = formattedValue;
        }

        function togglePanel(s) { document.getElementById('sidePanel').classList.toggle('open', s); }

        function switchView(v) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('regForm').classList.add('hidden');
            document.getElementById('verifyForm').classList.add('hidden');
            document.getElementById('msgBox').classList.add('hidden');
            if(v === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('panelTitle').innerText = "Giriş Yap";
            }
            if(v === 'reg') {
                document.getElementById('regForm').classList.remove('hidden');
                document.getElementById('panelTitle').innerText = "Kayıt Ol";
            }
            if(v === 'verify') {
                document.getElementById('verifyForm').classList.remove('hidden');
                document.getElementById('panelTitle').innerText = "Doğrulama Bekleniyor";
            }
        }

        function showMsg(m, t='error') {
            const b = document.getElementById('msgBox');
            b.innerText = m;
            b.className = `mb-6 p-5 rounded-2xl text-sm font-bold border transition-all duration-300 ${t === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'}`;
            b.classList.remove('hidden');
        }

        async function handleLogin() {
            const email = document.getElementById('l_email').value;
            const pass = document.getElementById('l_pass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return showMsg("Lütfen e-posta ve şifrenizi girin.");

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Kontrol ediliyor...';
                
                const res = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, passwordHash: pass })
                });
                
                const data = await res.json();
                
                if(!res.ok) throw new Error(data.message || "Giriş bilgileri hatalı.");
                if(!data.user && !data.email) throw new Error("Kullanıcı verisi alınamadı.");

                // Not: API bazen direkt kullanıcıyı, bazen {user: ...} şeklinde döndürür.
                const user = data.user || data;

                if(!user.isVerified) {
                    showMsg("Lütfen önce e-posta adresinizi doğrulayın.");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Giriş Yap</span>';
                    return;
                }

                showMsg("Giriş başarılı! Uygulamaya aktarılıyorsunuz...", "success");
                
                setTimeout(() => {
                    const userName = user.name || "Kullanıcı";
                    window.location.href = `${FLUTTER_APP_PATH}/#/list?user=${encodeURIComponent(userName)}`;
                }, 1000);

            } catch (e) { 
                showMsg(e.message); 
                btn.disabled = false;
                btn.innerHTML = '<span>Giriş Yap</span>';
            }
        }

        async function handleRegister() {
            const name = document.getElementById('r_name').value;
            const email = document.getElementById('r_email').value;
            const phone = document.getElementById('r_phone').value.replace(/\s/g, '');
            const pass = document.getElementById('r_pass').value;
            const btn = document.getElementById('regBtn');

            if(!name || !email || !pass || pass.length < 8) {
                return showMsg("Lütfen tüm alanları doldurun (Şifre en az 8 karakter).");
            }

            try {
                btn.disabled = true;
                btn.innerText = "Kaydediliyor...";

                const res = await fetch(`${API_URL}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name, email, phoneNumber: phone, passwordHash: pass, sendLink: true 
                    })
                });

                const data = await res.json();
                if(!res.ok) throw new Error(data.message || "Kayıt sırasında bir sorun oluştu.");
                
                document.getElementById('displayEmail').innerText = email;
                switchView('verify');
            } catch (e) { 
                showMsg(e.message); 
                btn.disabled = false;
                btn.innerText = "Kayıt Ol ve Link Gönder";
            }
        }
    </script>
</body>
</html>
