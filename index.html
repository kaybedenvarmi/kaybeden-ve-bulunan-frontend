<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaybeden ve Bulan | Eşya Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
                @apply bg-[#FDFDFD] text-[#1E293B] overflow-x-hidden;
            }
        }
        @layer components {
            .glass-card {
                @apply bg-white/80 backdrop-blur-md border border-slate-200 shadow-[0_8px_30px_rgb(0,0,0,0.04)];
            }
            .hero-gradient {
                background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
            }
            .btn-primary {
                @apply bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-8 rounded-2xl transition-all shadow-lg shadow-blue-200 active:scale-95 flex items-center justify-center gap-3;
            }
            .stat-badge {
                @apply px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-xs font-bold uppercase tracking-wider;
            }
        }
        
        .image-fade {
            transition: opacity 1.2s ease-in-out, transform 2s ease-out;
        }
        
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-100">

    <div class="fixed inset-0 hero-gradient -z-10"></div>

    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <header class="py-10 flex justify-between items-center">
            <!-- Sol Kısım: İkon ve Başlık -->
            <div class="flex items-center gap-4 group cursor-pointer" onclick="location.reload()">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-100 group-hover:rotate-6 transition-transform">
                    <i class="fa-solid fa-magnifying-glass-location text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-800 tracking-tight text-slate-900 leading-none">Kaybeden<span class="text-blue-600">ve</span>Bulan</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-1">İyi insanları buluşturma platformu</p>
                </div>
            </div>

            <!-- Sağ Kısım: Navigasyon -->
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
                    <a href="#" class="hover:text-blue-600 transition-colors">Nasıl Çalışır?</a>
                    <a href="#" class="hover:text-blue-600 transition-colors">İstatistikler</a>
                    <button onclick="goToApp()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl hover:bg-slate-800 transition-all">
                        Uygulamayı Aç
                    </button>
                </nav>
            </div>
        </header>

        <main class="grid lg:grid-cols-2 gap-16 items-center py-12 md:py-24">
            <div class="space-y-10">
                <div class="inline-flex items-center gap-2 stat-badge">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    Şu an 1,240+ aktif ilan yayında
                </div>
                
                <h2 id="dynamic-title" class="text-6xl md:text-7xl font-800 text-slate-900 leading-[1.1] tracking-tight min-h-[220px]">
                    <span id="title-part-1">Eşyalarınızı bulmanın</span> <br>
                    <span id="title-part-2" class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">en kolay yolu .</span>
                </h2>
                
                <p class="text-lg text-slate-500 leading-relaxed max-w-lg">
                    Türkiye’de kaybolan eşyaları sahipleriyle yeniden buluşturan platform. Güvenli, hızlı ve tamamen ücretsiz.
                </p>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button onclick="goToApp()" class="btn-primary">
                        <i class="fa-solid fa-plus-circle"></i>
                        İLAN VER VEYA ARA
                    </button>
                </div>
            </div>

            <div class="relative">
                <div class="absolute -top-10 -right-10 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
                
                <div class="glass-card p-4 rounded-[3.5rem] relative overflow-hidden">
                    <div id="image-container" class="w-full h-[600px] rounded-[2.8rem] overflow-hidden relative bg-slate-200">
                        <img id="main-hero-img" class="image-fade absolute inset-0 w-full h-full object-cover opacity-100 scale-100" src="" alt="Mutlu İnsanlar">
                    </div>
                    
                    <div class="absolute bottom-10 left-10 right-10 glass-card p-6 rounded-2xl flex justify-around">
                        <div class="text-center">
                            <div class="text-2xl font-bold text-slate-900">850+</div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Bulunan Eşya</div>
                        </div>
                        <div class="w-px h-10 bg-slate-200"></div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-slate-900">%92</div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Başarı Oranı</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const FLUTTER_APP_PATH = "/app"; 
        
        const myStaticImages = [
            'https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=800&q=80'
        ];

        const titleOptions = [
            { p1: "Eşyalarınızı bulmanın", p2: "en kolay yolu ." },
            { p1: "Kaybettin veya Buldun", p2: "Sisteme Yükle ." }
        ];

        let imgIndex = 0;
        let titleIndex = 0;
        
        const heroImg = document.getElementById('main-hero-img');
        const title1 = document.getElementById('title-part-1');
        const title2 = document.getElementById('title-part-2');

        function rotateContent() {
            imgIndex = (imgIndex + 1) % myStaticImages.length;
            heroImg.style.opacity = "0";
            heroImg.style.transform = "scale(1.05)";
            
            setTimeout(() => {
                heroImg.src = myStaticImages[imgIndex];
                heroImg.style.opacity = "1";
                heroImg.style.transform = "scale(1)";
            }, 1000);

            titleIndex = (titleIndex + 1) % titleOptions.length;
            const newTitle = titleOptions[titleIndex];
            
            title1.style.opacity = "0";
            title2.style.opacity = "0";
            
            setTimeout(() => {
                title1.innerText = newTitle.p1;
                title2.innerText = newTitle.p2;
                title1.style.opacity = "1";
                title2.style.opacity = "1";
            }, 600);
        }

        function goToApp() {
            document.body.style.opacity = "0.5";
            setTimeout(() => { window.location.href = FLUTTER_APP_PATH; }, 300);
        }

        window.onload = () => {
            heroImg.src = myStaticImages[0];
            setInterval(rotateContent, 6000);
        };

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            const gradient = document.querySelector('.hero-gradient');
            if(gradient) {
                gradient.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(37, 99, 235, 0.08) 0%, transparent 60%)`;
            }
        });
    </script>
</body>
</html>
